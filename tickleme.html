<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TickleMe ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Fredoka One', cursive;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  cursor: crosshair;
}

#cosmos {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 35% 45%, #0c0418 0%, #000 70%);
  z-index: 0;
}

#starCanvas {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
}

#hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  text-align: center;
  pointer-events: none;
  transition: opacity 1.2s ease;
}
#hint h1 {
  font-size: clamp(2.2rem, 9vw, 4.5rem);
  color: rgba(255,255,255,0.88);
  text-shadow: 0 0 28px rgba(160,100,255,0.7), 0 0 70px rgba(90,40,200,0.35);
  letter-spacing: 0.07em;
}
#hint p {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: clamp(0.8rem, 2.8vw, 1.15rem);
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 6px;
}
#hint.fade { opacity: 0; }

#score {
  position: fixed;
  top: 18px; right: 22px;
  z-index: 60;
  font-size: clamp(1.1rem, 4vw, 1.8rem);
  color: rgba(255,255,255,0.6);
  text-shadow: 0 0 14px rgba(255,210,60,0.55);
  pointer-events: none;
  letter-spacing: 0.08em;
}

#burstLayer {
  position: fixed; inset: 0;
  z-index: 90;
  pointer-events: none;
}

.burst-canvas {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%, -50%);
}

.lol {
  position: fixed;
  pointer-events: none;
  z-index: 95;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.5rem, 5.5vw, 2.8rem);
  transform: translate(-50%, -50%);
  animation: lolup 1s cubic-bezier(0.2,1,0.4,1) forwards;
  white-space: nowrap;
  text-shadow: 0 0 18px currentColor, 0 0 36px currentColor;
}
@keyframes lolup {
  0%   { opacity:1; transform: translate(-50%,-50%) scale(0.5) translateY(0); }
  45%  { opacity:1; transform: translate(-50%,-50%) scale(1.15) translateY(-48px); }
  100% { opacity:0; transform: translate(-50%,-50%) scale(0.75) translateY(-105px); }
}

#credit {
  position: fixed;
  bottom: 7px; left: 10px;
  font-family: sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.18);
  z-index: 999;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="cosmos"></div>
<canvas id="starCanvas"></canvas>
<div id="hint">
  <h1>✨ TickleMe ✨</h1>
  <p>Touch anywhere to find the tickle spots</p>
</div>
<div id="score">🎉 0</div>
<div id="burstLayer"></div>
<div id="credit">Sounds synthesised with Web Audio API</div>

<script>
'use strict';

// ─── Background starfield ───────────────────────────────────────────────────
const starCanvas = document.getElementById('starCanvas');
const sctx = starCanvas.getContext('2d');
let bgStars = [];

function resizeStarCanvas() {
  starCanvas.width  = window.innerWidth;
  starCanvas.height = window.innerHeight;
  bgStars = [];
  const n = Math.floor(starCanvas.width * starCanvas.height / 3200);
  for (let i = 0; i < n; i++) {
    bgStars.push({
      x:     Math.random() * starCanvas.width,
      y:     Math.random() * starCanvas.height,
      r:     0.3 + Math.random() * 1.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 1.1,
      base:  0.08 + Math.random() * 0.45,
    });
  }
}

function drawBgStars(t) {
  sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of bgStars) {
    const a = s.base + (1 - s.base) * 0.5 * (1 + Math.sin(t * s.speed + s.phase));
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
    sctx.fill();
  }
}

// ─── Audio: synthesised human-sounding laughs via Web Audio API ─────────────
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

// Master reverb (small room ambience)
let reverbNode = null;
function getReverbNode(ac) {
  if (reverbNode) return reverbNode;
  const len = ac.sampleRate * 0.5;
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 3);
  }
  const conv = ac.createConvolver();
  conv.buffer = buf;
  const wet = ac.createGain(); wet.gain.value = 0.18;
  conv.connect(wet); wet.connect(ac.destination);
  reverbNode = conv;
  return reverbNode;
}

// Core voiced syllable: shaped noise through formant filters simulating the vocal tract
function voicedSyllable(ac, t, pitch, dur, vowelF1, vowelF2, vol, breathiness) {
  const dest = ac.destination;
  const rev  = getReverbNode(ac);

  // Glottal source: mix of sawtooth (voiced) + noise (breathy)
  const sawOsc = ac.createOscillator();
  sawOsc.type = 'sawtooth';
  sawOsc.frequency.setValueAtTime(pitch, t);
  sawOsc.frequency.setValueAtTime(pitch * 0.97, t + dur * 0.6);

  // Breathiness noise
  const noiseLen = Math.ceil(dur * ac.sampleRate) + 512;
  const noiseBuf = ac.createBuffer(1, noiseLen, ac.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) nd[i] = Math.random()*2-1;
  const noiseSrc = ac.createBufferSource();
  noiseSrc.buffer = noiseBuf;

  // Glottal mix
  const sawGain   = ac.createGain(); sawGain.gain.value   = 1 - breathiness;
  const noiseGain = ac.createGain(); noiseGain.gain.value = breathiness * 0.5;

  // Formant 1 (jaw height / openness)
  const f1 = ac.createBiquadFilter();
  f1.type = 'bandpass'; f1.frequency.value = vowelF1; f1.Q.value = 5;

  // Formant 2 (tongue front/back)
  const f2 = ac.createBiquadFilter();
  f2.type = 'bandpass'; f2.frequency.value = vowelF2; f2.Q.value = 8;

  // Presence boost
  const presence = ac.createBiquadFilter();
  presence.type = 'peaking'; presence.frequency.value = 3000; presence.gain.value = 6; presence.Q.value = 1;

  // Amplitude envelope: attack / decay
  const env = ac.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + dur * 0.08);
  env.gain.setValueAtTime(vol, t + dur * 0.55);
  env.gain.exponentialRampToValueAtTime(0.001, t + dur);

  // Routing
  sawOsc.connect(sawGain);
  noiseSrc.connect(noiseGain);
  sawGain.connect(f1); sawGain.connect(f2);
  noiseGain.connect(f1); noiseGain.connect(f2);
  f1.connect(presence); f2.connect(presence);
  presence.connect(env);
  env.connect(dest);
  env.connect(rev);

  sawOsc.start(t); sawOsc.stop(t + dur + 0.02);
  noiseSrc.start(t); noiseSrc.stop(t + dur + 0.02);
}

// Laugh types — each is a sequence of voiced "ha/hee/ho" syllables
const LAUGH_TYPES = [

  // 0 – Child giggle: fast high-pitched "hee hee hee"
  (ac, t) => {
    const pitches = [520, 540, 510, 530, 560];
    pitches.forEach((p, i) => {
      voicedSyllable(ac, t + i*0.13, p, 0.10, 800, 2300, 0.4, 0.15);
    });
  },

  // 1 – Classic "ha ha ha" adult laugh: mid-pitch, open vowel /a/
  (ac, t) => {
    [0, 0.24, 0.48].forEach((offset, i) => {
      voicedSyllable(ac, t + offset, 200 - i*8, 0.20, 900, 1400, 0.55, 0.08);
    });
  },

  // 2 – Belly laugh "HO HO HO": low, resonant, wide mouth
  (ac, t) => {
    [0, 0.30, 0.60].forEach((offset, i) => {
      voicedSyllable(ac, t + offset, 140 + i*5, 0.26, 600, 1000, 0.7, 0.05);
    });
  },

  // 3 – Rapid giggle burst "hehehehe": high-pitched fast
  (ac, t) => {
    for (let i = 0; i < 7; i++) {
      const p = 380 + Math.sin(i)*30 + Math.random()*20;
      voicedSyllable(ac, t + i*0.095, p, 0.08, 700, 2100, 0.35, 0.18);
    }
  },

  // 4 – Snort + giggle: noise burst then high hee-hee
  (ac, t) => {
    // snort: filtered noise burst
    const snortLen = Math.ceil(0.09 * ac.sampleRate);
    const sb = ac.createBuffer(1, snortLen, ac.sampleRate);
    const sd = sb.getChannelData(0);
    for (let i = 0; i < snortLen; i++) sd[i] = (Math.random()*2-1);
    const ssrc = ac.createBufferSource(); ssrc.buffer = sb;
    const sf = ac.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=1800; sf.Q.value=6;
    const sg = ac.createGain();
    sg.gain.setValueAtTime(0.5, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t+0.09);
    ssrc.connect(sf); sf.connect(sg); sg.connect(ac.destination);
    ssrc.start(t); ssrc.stop(t+0.1);
    // follow with giggle
    [0.12, 0.22, 0.32].forEach((off, i) => {
      voicedSyllable(ac, t + off, 500+i*20, 0.09, 750, 2200, 0.38, 0.20);
    });
  },

  // 5 – Wheeze-laugh: breathy high wobble
  (ac, t) => {
    const ac2 = ac;
    const osc = ac2.createOscillator();
    const lfo = ac2.createOscillator();
    const lfoG = ac2.createGain();
    const filt = ac2.createBiquadFilter();
    const env  = ac2.createGain();
    const rev  = getReverbNode(ac2);

    osc.type = 'sawtooth'; osc.frequency.value = 380;
    lfo.type = 'sine'; lfo.frequency.value = 11;
    lfoG.gain.value = 60;
    filt.type = 'bandpass'; filt.frequency.value = 2200; filt.Q.value = 4;

    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(0.4, t+0.12);
    env.gain.setValueAtTime(0.4, t+0.55);
    env.gain.exponentialRampToValueAtTime(0.001, t+1.1);

    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    osc.connect(filt); filt.connect(env);
    env.connect(ac2.destination); env.connect(rev);
    osc.start(t); lfo.start(t);
    osc.stop(t+1.15); lfo.stop(t+1.15);
  },

  // 6 – Girl laugh: rising pitch "hee hee hee" bright vowel
  (ac, t) => {
    const pats = [480, 510, 530, 550, 540, 560];
    pats.forEach((p, i) => {
      voicedSyllable(ac, t + i*0.14, p, 0.11, 820, 2500, 0.38, 0.12);
    });
  },
];

let lastSnd = -1;
function playLaugh() {
  const ac = getAC();
  let i;
  do { i = Math.floor(Math.random() * LAUGH_TYPES.length); } while (i === lastSnd && LAUGH_TYPES.length > 1);
  lastSnd = i;
  LAUGH_TYPES[i](ac, ac.currentTime + 0.01);
}

// ─── Burst palettes ─────────────────────────────────────────────────────────
const PALETTES = [
  { core:'#fffbe0', mid:'#ffe347', outer:'#ff9200', glow:'rgba(255,195,0,0.6)'   },
  { core:'#e0f9ff', mid:'#44ddff', outer:'#006bff', glow:'rgba(0,170,255,0.55)' },
  { core:'#ffe8ff', mid:'#ff55ee', outer:'#aa00ff', glow:'rgba(185,0,255,0.5)'  },
  { core:'#e5ffe8', mid:'#44ff99', outer:'#00aa44', glow:'rgba(0,190,80,0.5)'   },
  { core:'#fff3e0', mid:'#ff9944', outer:'#ff2200', glow:'rgba(255,60,0,0.5)'   },
  { core:'#eeeeff', mid:'#88aaff', outer:'#2244ff', glow:'rgba(50,90,255,0.5)'  },
  { core:'#ffffff', mid:'#ffeeaa', outer:'#ffaa00', glow:'rgba(255,180,0,0.55)' },
];

// ─── Lens-flare starburst ────────────────────────────────────────────────────
function createBurst(x, y, pal) {
  const size  = Math.min(window.innerWidth, window.innerHeight) * (0.48 + Math.random() * 0.38);
  const dim   = Math.round(size * 2.6);
  const cvs   = document.createElement('canvas');
  cvs.className = 'burst-canvas';
  cvs.width = cvs.height = dim;
  cvs.style.width  = dim + 'px';
  cvs.style.height = dim + 'px';
  cvs.style.left   = x + 'px';
  cvs.style.top    = y + 'px';
  document.getElementById('burstLayer').appendChild(cvs);

  const c   = cvs.getContext('2d');
  const cx  = dim / 2, cy = dim / 2;
  const baseAngle = Math.random() * (Math.PI / 8);
  const nMain = 8;
  const nSub  = 16;

  const GROW = 0.16, HOLD = 0.22, FADE = 0.30;
  const TOTAL = GROW + HOLD + FADE;
  let t0 = null, jAngle = 0, jVel = (Math.random() - 0.5) * 0.05, pulse = 0;

  function frame(ts) {
    if (!t0) t0 = ts;
    const el = (ts - t0) / 1000;
    if (el > TOTAL) { cvs.remove(); return; }

    jVel   += (Math.random() - 0.5) * 0.003;
    jVel   *= 0.87;
    jAngle += jVel;
    pulse  += 0.22;
    const pb = 0.5 + 0.5 * Math.sin(pulse); // 0–1 pulsing

    let prog, alpha;
    if (el < GROW) {
      const t = el / GROW;
      prog  = 1 - Math.pow(1 - t, 3);
      alpha = t;
    } else if (el < GROW + HOLD) {
      prog  = 1;
      alpha = 1;
    } else {
      const t = (el - GROW - HOLD) / FADE;
      prog  = 1 + t * 0.22;
      alpha = 1 - t;
    }

    c.clearRect(0, 0, dim, dim);
    c.save();
    c.globalAlpha = alpha;
    c.translate(cx, cy);
    c.rotate(jAngle);

    const maxR = size * prog * 0.5;

    // Outer glow
    const gg = c.createRadialGradient(0,0,0, 0,0, maxR * 1.25);
    gg.addColorStop(0,   pal.glow.replace(/[\d.]+\)$/, '0.3)'));
    gg.addColorStop(0.5, pal.glow.replace(/[\d.]+\)$/, '0.1)'));
    gg.addColorStop(1,   'rgba(0,0,0,0)');
    c.fillStyle = gg;
    c.beginPath();
    c.arc(0, 0, maxR * 1.25, 0, Math.PI*2);
    c.fill();

    // Main spikes
    for (let i = 0; i < nMain; i++) {
      const ang = baseAngle + (i / nMain) * Math.PI * 2;
      const len = maxR * (0.88 + pb * 0.12);
      const w   = size * 0.022 * (1 + pb * 0.25);

      c.save();
      c.rotate(ang);
      const rg = c.createLinearGradient(0, 0, 0, -len);
      rg.addColorStop(0,    pal.mid);
      rg.addColorStop(0.18, pal.mid);
      rg.addColorStop(0.65, pal.outer + 'bb');
      rg.addColorStop(1,    'rgba(0,0,0,0)');

      c.beginPath();
      c.moveTo(-w/2, 0);
      c.lineTo(0, -len);
      c.lineTo( w/2, 0);
      c.closePath();
      c.fillStyle = rg;
      c.fill();

      // bright spine
      c.beginPath();
      c.moveTo(0, -len * 0.04);
      c.lineTo(0, -len);
      c.strokeStyle = pal.core;
      c.lineWidth = w * 0.15;
      c.globalAlpha = 0.75;
      c.stroke();
      c.globalAlpha = 1;
      c.restore();
    }

    // Sub spikes
    for (let i = 0; i < nSub; i++) {
      const ang = baseAngle + (Math.PI / nMain) + (i / nSub) * Math.PI * 2;
      const len = maxR * (0.32 + pb * 0.08);
      const w   = size * 0.008;

      c.save();
      c.rotate(ang);
      const rg2 = c.createLinearGradient(0, 0, 0, -len);
      rg2.addColorStop(0, pal.mid + 'cc');
      rg2.addColorStop(1, 'rgba(0,0,0,0)');
      c.beginPath();
      c.moveTo(-w/2, 0);
      c.lineTo(0, -len);
      c.lineTo( w/2, 0);
      c.closePath();
      c.fillStyle = rg2;
      c.fill();
      c.restore();
    }

    // Halo ring (slight throb)
    const rR = maxR * (0.26 + pb * 0.04);
    const ring = c.createRadialGradient(0,0, rR*0.65, 0,0, rR*1.08);
    ring.addColorStop(0,   'rgba(0,0,0,0)');
    ring.addColorStop(0.55, pal.mid + '44');
    ring.addColorStop(0.88, pal.outer + '22');
    ring.addColorStop(1,   'rgba(0,0,0,0)');
    c.fillStyle = ring;
    c.beginPath();
    c.arc(0, 0, rR * 1.08, 0, Math.PI*2);
    c.fill();

    // Bright centre
    const cR = size * 0.042 * (1 + pb * 0.28);
    const cg = c.createRadialGradient(0,0,0, 0,0, cR);
    cg.addColorStop(0,   '#ffffff');
    cg.addColorStop(0.25, pal.core);
    cg.addColorStop(0.7,  pal.mid);
    cg.addColorStop(1,   'rgba(0,0,0,0)');
    c.fillStyle = cg;
    c.beginPath();
    c.arc(0, 0, cR, 0, Math.PI*2);
    c.fill();

    // Lens flare dots
    const flareA = baseAngle + jAngle;
    for (let f = 0; f < 5; f++) {
      const fd   = maxR * (0.38 + f * 0.16);
      const fr   = size * Math.max(0.005, 0.018 - f * 0.003) * prog;
      const fx   = Math.cos(flareA + Math.PI) * fd;
      const fy   = Math.sin(flareA + Math.PI) * fd;
      const fg   = c.createRadialGradient(fx, fy, 0, fx, fy, fr);
      fg.addColorStop(0, pal.core);
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      c.fillStyle = fg;
      c.globalAlpha = 0.38 * (1 - f * 0.14);
      c.beginPath();
      c.arc(fx, fy, fr, 0, Math.PI*2);
      c.fill();
      c.globalAlpha = 1;
    }

    c.restore();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

// ─── LOL text ────────────────────────────────────────────────────────────────
const POPS = ['HA!','HEE!','LOL!','HAHA!','HO HO!','TEE HEE!','WHEEE!','HA HA HA!','SNORT!','🤣'];
function spawnLol(x, y, pal) {
  const el = document.createElement('div');
  el.className = 'lol';
  el.style.left  = (x + (Math.random()-0.5)*80) + 'px';
  el.style.top   = (y + (Math.random()-0.5)*55) + 'px';
  el.style.color = pal.mid;
  el.textContent = POPS[Math.floor(Math.random() * POPS.length)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ─── Tickle zones (invisible) ────────────────────────────────────────────────
const NUM_ZONES = 8;
const MIN_GAP_FRAC = 0.17;
let zones = [];

function placeZones() {
  zones = [];
  const W = window.innerWidth, H = window.innerHeight;
  const gap = Math.min(W, H) * MIN_GAP_FRAC;
  const m = 0.09;
  let attempts = 0;
  while (zones.length < NUM_ZONES && attempts < 900) {
    attempts++;
    const x = W * (m + Math.random() * (1 - 2*m));
    const y = H * (m + Math.random() * (1 - 2*m));
    let ok = true;
    for (const z of zones) { if (Math.hypot(z.x-x, z.y-y) < gap) { ok=false; break; } }
    if (ok) zones.push({ x, y, r: Math.min(W,H) * (0.12 + Math.random()*0.07) });
  }
}

function hitZone(px, py) {
  for (let i = 0; i < zones.length; i++) {
    const z = zones[i];
    if (Math.hypot(z.x-px, z.y-py) <= z.r) return i;
  }
  return -1;
}

function teleport(idx) {
  const W = window.innerWidth, H = window.innerHeight;
  const gap = Math.min(W,H) * MIN_GAP_FRAC;
  const m = 0.09;
  for (let attempt = 0; attempt < 250; attempt++) {
    const x = W*(m+Math.random()*(1-2*m)), y = H*(m+Math.random()*(1-2*m));
    let ok = true;
    for (let i = 0; i < zones.length; i++) {
      if (i===idx) continue;
      if (Math.hypot(zones[i].x-x, zones[i].y-y) < gap) { ok=false; break; }
    }
    if (ok) { zones[idx].x=x; zones[idx].y=y; return; }
  }
}

// ─── Score & state ────────────────────────────────────────────────────────────
let score = 0, hintFaded = false;
const cooldown = new Set();

function onTap(x, y) {
  const idx = hitZone(x, y);
  if (idx === -1 || cooldown.has(idx)) return;
  cooldown.add(idx);

  const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
  const z   = zones[idx];

  playLaugh();
  createBurst(z.x, z.y, pal);
  spawnLol(z.x, z.y, pal);
  score++;
  document.getElementById('score').textContent = '🎉 ' + score;

  if (!hintFaded) {
    document.getElementById('hint').classList.add('fade');
    hintFaded = true;
  }

  setTimeout(() => { teleport(idx); cooldown.delete(idx); }, 850);
}

// ─── Input — tap AND drag ─────────────────────────────────────────────────────
// Track which pointer IDs are currently pressed so we only fire on active touch/drag
const activePointers = new Set();

document.addEventListener('pointerdown', e => {
  activePointers.add(e.pointerId);
  onTap(e.clientX, e.clientY);
}, { passive: true });

document.addEventListener('pointermove', e => {
  if (!activePointers.has(e.pointerId)) return;   // only while finger/mouse is down
  onTap(e.clientX, e.clientY);
}, { passive: true });

document.addEventListener('pointerup',     e => { activePointers.delete(e.pointerId); }, { passive: true });
document.addEventListener('pointercancel', e => { activePointers.delete(e.pointerId); }, { passive: true });

// ─── Resize ───────────────────────────────────────────────────────────────────
let resizeT;
window.addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => { resizeStarCanvas(); placeZones(); }, 250);
});

// ─── Main loop ────────────────────────────────────────────────────────────────
(function loop(ts) {
  drawBgStars(ts / 1000);
  requestAnimationFrame(loop);
})(0);

// ─── Init ─────────────────────────────────────────────────────────────────────
resizeStarCanvas();
placeZones();
</script>
</body>
</html>
